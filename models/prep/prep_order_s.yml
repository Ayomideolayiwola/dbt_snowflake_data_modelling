models:
  - name: prep_order_s
    description: "referencing staging orders"
    columns:
      - name: order_id_surrogate
        description: " primary key to the table "
        data_tests:
          - not_null
          - unique
      - name: order_id
        description: "same primary key"
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: "foreign key to prep customer table "
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('prep_customer')
                field: customer_id
      - name: order_date
        description: "date the order was placed"
      - name: campaign_id
        description: "foreign key to the prep campaign table"
        data_tests:
          - relationships:
              arguments:
                to: ref('prep_marketing_campaigns')
                field: campaign_id
      - name: amount
        description: " amount paid for the order in values"
      - name: payment_method_id
        description: "foreign key to prep payment_method table"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('prep_payment_method')
                field: payment_method_id

      

