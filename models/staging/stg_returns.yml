models:
  - name: stg_returns
    description: "staging model for returns "
    columns:
      - name: return_id
        description: " primary key for returns "
        data_tests:
          - not_null
          - unique
      - name: order_id
        description: " foreign key to stg_order"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_order_s')
                field: order_id
      - name: product_id
        description: "foreign key to products"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: return_date
        description: "date the order was initiated"
        data_tests:
          - not_null
      - name: reason
        description: "reason for the return "
        data_tests:
          - not_null
      - name: amount_refunded
        description: "amount refunded to the customer "
        data_tests:
          - not_null





